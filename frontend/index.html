<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Conversor Numérico</title>
    <link rel="stylesheet" href="styles.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="manifest" href="manifest.json" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta
      name="apple-mobile-web-app-status-bar-style"
      content="black-translucent"
    />
    <link rel="apple-touch-icon" href="icon-192.png" />
  </head>
  <body>
    <div class="bg-decoration">
      <div class="glow glow-1"></div>
      <div class="glow glow-2"></div>
    </div>

    <main class="container">
      <header class="header">
        <div class="logo">
          <svg width="48" height="48" viewBox="0 0 48 48" fill="none">
            <rect width="48" height="48" rx="14" fill="url(#logoGrad)" />
            <path
              d="M14 24h20M24 14v20"
              stroke="white"
              stroke-width="3.5"
              stroke-linecap="round"
            />
            <defs>
              <linearGradient id="logoGrad" x1="0" y1="0" x2="48" y2="48">
                <stop stop-color="#6366f1" />
                <stop offset="1" stop-color="#8b5cf6" />
              </linearGradient>
            </defs>
          </svg>
        </div>
        <h1>Conversor</h1>
        <p class="subtitle">Transforma números entre sistemas</p>
      </header>

      <section class="converter">
        <div class="from-section">
          <label class="section-label">
            <span class="label-text">De</span>
          </label>
          <div class="system-picker">
            <button class="system-btn active" data-system="bin" data-base="2">
              Bin
            </button>
            <button class="system-btn" data-system="oct" data-base="8">
              Oct
            </button>
            <button class="system-btn" data-system="dec" data-base="10">
              Dec
            </button>
            <button class="system-btn" data-system="hex" data-base="16">
              Hex
            </button>
            <button class="system-btn" data-system="custom" data-base="0">
              Custom
            </button>
          </div>
          <div id="customFromGroup" class="custom-base-group hidden">
            <input
              type="number"
              id="customFromBase"
              min="2"
              max="16"
              value="12"
              placeholder="Base"
            />
            <span class="custom-label">Base custom</span>
          </div>
          <div class="input-wrapper">
            <input
              type="text"
              id="numberInput"
              placeholder="Ingresa un número"
              autocomplete="off"
              autocapitalize="off"
            />
          </div>
          <span id="inputHint" class="input-hint">Solo 0 y 1</span>
        </div>

        <div class="swap-center">
          <button id="swapBtn" class="btn-swap">
            <svg
              width="24"
              height="24"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <path d="M7 16V4M7 4L3 8M7 4l4 4" />
              <path d="M17 8v12m0 0 4-4m-4 4-4-4" />
            </svg>
          </button>
        </div>

        <div class="to-section">
          <label class="section-label">
            <span class="label-text">A</span>
          </label>
          <div class="system-picker">
            <button class="system-btn" data-system="bin" data-base="2">
              Bin
            </button>
            <button class="system-btn" data-system="oct" data-base="8">
              Oct
            </button>
            <button class="system-btn" data-system="dec" data-base="10">
              Dec
            </button>
            <button class="system-btn active" data-system="hex" data-base="16">
              Hex
            </button>
            <button class="system-btn" data-system="custom" data-base="0">
              Custom
            </button>
          </div>
          <div id="customToGroup" class="custom-base-group hidden">
            <input
              type="number"
              id="customToBase"
              min="2"
              max="16"
              value="12"
              placeholder="Base"
            />
            <span class="custom-label">Base custom</span>
          </div>
          <div class="output-wrapper">
            <span id="resultValue" class="result-text">—</span>
          </div>
        </div>

        <button id="convertBtn" class="btn-convert">
          <span class="btn-text">Convertir</span>
          <span class="btn-loader hidden">
            <svg class="spinner" viewBox="0 0 24 24">
              <circle
                cx="12"
                cy="12"
                r="10"
                stroke="currentColor"
                stroke-width="3"
                fill="none"
                stroke-dasharray="31.4 31.4"
              />
            </svg>
          </span>
        </button>
      </section>

      <section id="errorSection" class="error hidden">
        <svg
          width="18"
          height="18"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
        >
          <circle cx="12" cy="12" r="10" />
          <line x1="12" y1="8" x2="12" y2="12" />
          <line x1="12" y1="16" x2="12.01" y2="16" />
        </svg>
        <span id="errorMessage"></span>
      </section>

      <footer class="footer">
        <p>Click en el resultado para copiar</p>
      </footer>
    </main>

    <script src="app.js">
          // Registro del Service Worker
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('./sw.js')
          .then(() => console.log("PWA Lista"))
          .catch((err) => console.log("Fallo:", err));
      }
    </script>
  </body>
</html>
